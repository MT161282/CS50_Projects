{% extends "layout.html" %}

{% block main %}
  <h1>Sell</h1>
  <form action="/sell" method="post">
    <div class="mb-3">
      <select
        class="form-select mx-auto w-auto"
        id="symbol"
        name="symbol"
      >
        <option disabled selected value="">Symbol</option>
        {% for stock in stocks %}
          <option value="{{ stock['symbol'] }}">{{ stock['symbol'] }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <input
        class="form-control mx-auto w-auto"
        id="shares"
        min="1"
        name="shares"
        placeholder="Shares"
        type="number"
      />
    </div>
    <button class="btn btn-danger" type="submit">Sell</button>
  </form>
{% endblock %}
