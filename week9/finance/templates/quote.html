{% extends "layout.html" %}

{% block main %}
  <h1>Get Quote</h1>
  <form action="/quote" method="post">
    <div class="mb-3">
      <input
        autofocus
        class="form-control mx-auto w-auto"
        id="symbol"
        name="symbol"
        placeholder="Symbol"
        type="text"
      />
    </div>
    <button class="btn btn-primary" type="submit">Quote</button>
  </form>
{% endblock %}
